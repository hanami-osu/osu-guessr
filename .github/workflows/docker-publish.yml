name: Docker Publish

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  IMAGE_NAME: yorunoken/osu-guessr

jobs:
  quality:
    name: Check, test, and build
    runs-on: ubuntu-latest
    services:
      mariadb:
        image: mariadb:11.4
        env:
          MARIADB_ROOT_PASSWORD: migration-test
          MARIADB_DATABASE: osu_guessr_migration_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mariadb-admin ping --silent -h 127.0.0.1 -pmigration-test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    env:
      DATABASE_URL: mysql://root:migration-test@127.0.0.1:3306/osu_guessr_migration_test
      MIGRATION_TEST_DATABASE_URL: mysql://root:migration-test@127.0.0.1:3306/osu_guessr_migration_test
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate identity migration
        run: |
          bun run prisma:generate
          bun run prisma:validate
          bun run db:migration:test:prepare
          bun run db:migrate:deploy
          bun run db:migration:test:verify

      - name: Check
        run: bun run check

      - name: Test
        run: bun test

      - name: Build
        run: bun run build

  docker:
    name: Build and publish Docker image
    needs: quality
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-

      - name: Verify Server Actions key
        if: github.event_name != 'pull_request'
        env:
          NEXT_SERVER_ACTIONS_ENCRYPTION_KEY: ${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
        run: test -n "$NEXT_SERVER_ACTIONS_ENCRYPTION_KEY"

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            GIT_SHA=${{ github.sha }}
          secrets: |
            next_server_actions_encryption_key=${{ secrets.NEXT_SERVER_ACTIONS_ENCRYPTION_KEY }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
